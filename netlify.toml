[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  framework = "vite"
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[context.production.environment]
  PORT = "5174"
  DEFAULT_REGION = "US"
  CACHE_TTL_SECONDS = "300"
  ASTRA_DB_KEYSPACE = "movies2026"

